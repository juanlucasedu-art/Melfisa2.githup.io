<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosotros - MELFISA II</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="img/logo.png" class="logo-img">
                <span class="centro-nombre">MELFISA II</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html" class="active">Nosotros</a></li>
                <li><a href="niveles.html">Niveles</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main class="seccion-contenedor">
        <h2>Sobre Nosotros</h2>
        <img src="img/NOSOTROS.jpg" class="foto-ajustada" alt="Colegio melfisa II">
        <div class="info-nosotros">
            <h1>¿Quiénes somos?</h1>
            <p>Somos un centro dedicado a la educación Integral</p>
            <p><strong>Dirección:</strong> Nkuantoma, LT.</p>
            <p>Comprometidos con la educación integral en Bata.</p>
        </div>
    </main>
    <footer class="footer-oscuro">
        <p>COLEGIO PRIVADO MELFISA II - 2026</p>
    </footer>
<div id="miModal" class="modal-imagen" onclick="this.style.display='none'">
    <img id="imgAmpliada">
</div>

<script>
    // Selecciona todas las imágenes dentro de las secciones
    document.querySelectorAll('.seccion-contenedor img, .categoria-card img').forEach(imagen => {
        imagen.onclick = function() {
            document.getElementById("miModal").style.display = "flex";
            document.getElementById("imgAmpliada").src = this.src;
        }
    });
</script>

</body>
</html>
